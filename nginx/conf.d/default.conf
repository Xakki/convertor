server {
    listen 80;
    server_name _;

    # Health / status endpoints
    location /ping {
        access_log off;
        default_type "text/html";
        return 200 "pong\n";
    }

    location /ngxstat {
        stub_status on;
        access_log off;
    }

    # --- Frontend static files ---
    root /var/www/frontend;
    index index.html;

    # --- API: proxy to PHP-FPM ---
    # Generic API location
    location /api/ {
        include fastcgi_params;
        fastcgi_pass unix:/var/run/php/php-fpm.sock;

        fastcgi_buffering        on;
        fastcgi_buffer_size      64K;
        fastcgi_buffers          32 64k;
        fastcgi_max_temp_file_size 0;

        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME /var/www/app/public/index.php;
        fastcgi_param PATH_INFO       $fastcgi_path_info;
        fastcgi_param REMOTE_ADDR     $remote_addr;

        fastcgi_connect_timeout  10;
        fastcgi_send_timeout     60;
        fastcgi_read_timeout     300;
        fastcgi_intercept_errors on;

        proxy_set_header X-Real-IP          $remote_addr;
        proxy_set_header X-Forwarded-Proto  $scheme;
        proxy_set_header X-Forwarded-For    $proxy_add_x_forwarded_for;

        client_max_body_size 64m;

        # CORS
        add_header 'Access-Control-Allow-Origin'      "*" always;
        add_header 'Access-Control-Allow-Credentials' 'false' always;
        add_header 'Access-Control-Allow-Methods'     'GET, POST, PUT, DELETE, OPTIONS' always;
        add_header 'Access-Control-Allow-Headers'     'Accept,Authorization,Cache-Control,Content-Type,DNT,If-Modified-Since,Keep-Alive,Origin,User-Agent,X-Requested-With' always;

        if ($request_method = 'OPTIONS') {
            add_header 'Access-Control-Max-Age' 1728000;
            add_header 'Content-Type' 'text/plain charset=UTF-8';
            add_header 'Content-Length' 0;
            return 200;
        }
    }

    # Upload endpoint — raised body size limit
    location /api/v1/convert {
        include fastcgi_params;
        fastcgi_pass unix:/var/run/php/php-fpm.sock;

        fastcgi_buffering        on;
        fastcgi_buffer_size      64K;
        fastcgi_buffers          32 64k;
        fastcgi_max_temp_file_size 0;

        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME /var/www/app/public/index.php;
        fastcgi_param PATH_INFO       $fastcgi_path_info;
        fastcgi_param REMOTE_ADDR     $remote_addr;

        fastcgi_connect_timeout  10;
        fastcgi_send_timeout     300;
        fastcgi_read_timeout     600;
        fastcgi_intercept_errors on;

        proxy_set_header X-Real-IP          $remote_addr;
        proxy_set_header X-Forwarded-Proto  $scheme;
        proxy_set_header X-Forwarded-For    $proxy_add_x_forwarded_for;

        # Allow large file uploads
        client_max_body_size 512m;
        client_body_timeout  300s;
    }

    # --- Internal LibreOffice proxy (not exposed via public URL) ---
    # Accessible only from within the backend network; no external location block needed.
    # Internal services call http://libreoffice:6000 directly.

    # --- Static assets ---
    location ~* ^.+\.(svg|jpg|jpeg|gif|png|ico|css|zip|tgz|gz|rar|bz2|doc|xls|exe|pdf|ppt|tar|mid|midi|wav|bmp|rtf|js|swf|woff|woff2|ttf|map|json)$ {
        include params/static_params;
        expires 7d;
        add_header Cache-Control "public, immutable";
    }

    # --- SPA fallback ---
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Deny dotfiles
    location ~ /\.(htaccess|htpasswd|svn|bzr|git|gitignore|idea) {
        deny all;
    }
}
