<!-- Login Modal Component -->
<!-- Include this via: hx-get="/components/login-modal.html" hx-trigger="load" hx-target="#login-modal-container" -->
<div
  id="login-modal"
  x-data="loginModal()"
  @open-login.window="open()"
  @keydown.escape.window="close()"
  x-show="isOpen"
  x-cloak
  class="fixed inset-0 z-50 flex items-center justify-center p-4"
  role="dialog"
  aria-modal="true"
  aria-labelledby="login-modal-title">

  <!-- Backdrop -->
  <div
    class="absolute inset-0 bg-black/70 backdrop-blur-sm"
    @click="close()"
    aria-hidden="true">
  </div>

  <!-- Modal -->
  <div
    x-transition:enter="transition ease-out duration-200"
    x-transition:enter-start="opacity-0 scale-95"
    x-transition:enter-end="opacity-100 scale-100"
    x-transition:leave="transition ease-in duration-150"
    x-transition:leave-start="opacity-100 scale-100"
    x-transition:leave-end="opacity-0 scale-95"
    class="relative w-full max-w-md rounded-2xl border border-zinc-700 bg-zinc-900 p-6 shadow-2xl">

    <!-- Close button -->
    <button
      @click="close()"
      class="absolute right-4 top-4 rounded-lg p-1 text-zinc-500 hover:bg-zinc-800 hover:text-white transition-colors focus:outline-none focus:ring-2 focus:ring-indigo-500"
      aria-label="Закрыть модальное окно">
      <svg class="h-5 w-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
        <path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12"/>
      </svg>
    </button>

    <!-- Title -->
    <h2 id="login-modal-title" class="text-xl font-bold text-white">Войти в Convertor</h2>
    <p class="mt-1 text-sm text-zinc-400">Авторизуйтесь, чтобы сохранять историю и увеличить квоту</p>

    <!-- Tabs -->
    <div class="mt-6 flex rounded-lg bg-zinc-800 p-1" role="tablist" aria-label="Способы входа">
      <button
        @click="tab = 'telegram'"
        :class="tab === 'telegram' ? 'bg-zinc-700 text-white shadow' : 'text-zinc-400 hover:text-white'"
        class="flex-1 rounded-md px-3 py-2 text-sm font-medium transition-all focus:outline-none focus:ring-2 focus:ring-indigo-500"
        role="tab"
        :aria-selected="tab === 'telegram'"
        id="tab-telegram"
        aria-controls="panel-telegram">
        <span class="flex items-center justify-center gap-2">
          <svg class="h-4 w-4" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
            <path d="M11.944 0A12 12 0 0 0 0 12a12 12 0 0 0 12 12 12 12 0 0 0 12-12A12 12 0 0 0 12 0a12 12 0 0 0-.056 0zm4.962 7.224c.1-.002.321.023.465.14a.506.506 0 0 1 .171.325c.016.093.036.306.02.472-.18 1.898-.962 6.502-1.36 8.627-.168.9-.499 1.201-.82 1.23-.696.065-1.225-.46-1.9-.902-1.056-.693-1.653-1.124-2.678-1.8-1.185-.78-.417-1.21.258-1.91.177-.184 3.247-2.977 3.307-3.23.007-.032.014-.15-.056-.212s-.174-.041-.249-.024c-.106.024-1.793 1.14-5.061 3.345-.48.33-.913.49-1.302.48-.428-.008-1.252-.241-1.865-.44-.752-.245-1.349-.374-1.297-.789.027-.216.325-.437.893-.663 3.498-1.524 5.83-2.529 6.998-3.014 3.332-1.386 4.025-1.627 4.476-1.635z"/>
          </svg>
          Telegram
        </span>
      </button>
      <button
        @click="tab = 'sms'"
        :class="tab === 'sms' ? 'bg-zinc-700 text-white shadow' : 'text-zinc-400 hover:text-white'"
        class="flex-1 rounded-md px-3 py-2 text-sm font-medium transition-all focus:outline-none focus:ring-2 focus:ring-indigo-500"
        role="tab"
        :aria-selected="tab === 'sms'"
        id="tab-sms"
        aria-controls="panel-sms">
        SMS
      </button>
    </div>

    <!-- Error message -->
    <div
      x-show="error"
      x-transition
      class="mt-4 rounded-lg border border-red-500/30 bg-red-500/10 px-4 py-3 text-sm text-red-400"
      role="alert"
      id="auth-error">
      <span x-text="error"></span>
    </div>

    <!-- Telegram Tab -->
    <div
      x-show="tab === 'telegram'"
      id="panel-telegram"
      role="tabpanel"
      aria-labelledby="tab-telegram"
      class="mt-6">
      <p class="mb-4 text-sm text-zinc-400">Войдите через Telegram — быстро и безопасно. Никаких паролей.</p>
      <div class="flex justify-center">
        <!-- Telegram Login Widget -->
        <script async src="https://telegram.org/js/telegram-widget.js?22"
          data-telegram-login="YOUR_BOT_USERNAME"
          data-size="large"
          data-onauth="onTelegramAuth(user)"
          data-request-access="write">
        </script>
        <!-- Fallback if widget doesn't load -->
        <noscript>
          <p class="text-sm text-zinc-500">Для входа через Telegram необходим JavaScript.</p>
        </noscript>
      </div>
    </div>

    <!-- SMS Tab -->
    <div
      x-show="tab === 'sms'"
      id="panel-sms"
      role="tabpanel"
      aria-labelledby="tab-sms"
      class="mt-6">

      <!-- Phone input step -->
      <div x-show="step === 'phone'">
        <label for="phone-input" class="block text-sm font-medium text-zinc-300">Номер телефона</label>
        <div class="mt-2 flex gap-2">
          <input
            id="phone-input"
            type="tel"
            x-model="phone"
            @keydown.enter="requestOtp()"
            placeholder="+7 999 123 45 67"
            autocomplete="tel"
            class="flex-1 rounded-lg border border-zinc-700 bg-zinc-800 px-4 py-2.5 text-white placeholder-zinc-500 focus:border-indigo-500 focus:outline-none focus:ring-1 focus:ring-indigo-500"
            aria-required="true">
          <button
            @click="requestOtp()"
            :disabled="loading || !phone"
            class="rounded-lg bg-indigo-600 px-4 py-2.5 text-sm font-medium text-white hover:bg-indigo-500 disabled:opacity-50 disabled:cursor-not-allowed transition-colors focus:outline-none focus:ring-2 focus:ring-indigo-500">
            <span x-show="!loading">Получить код</span>
            <span x-show="loading">
              <svg class="h-4 w-4 animate-spin" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
                <path stroke-linecap="round" stroke-linejoin="round" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"/>
              </svg>
            </span>
          </button>
        </div>
      </div>

      <!-- OTP input step -->
      <div x-show="step === 'otp'">
        <p class="text-sm text-zinc-400">Код отправлен на <span class="font-medium text-white" x-text="phone"></span></p>
        <label for="otp-input" class="mt-4 block text-sm font-medium text-zinc-300">Код из SMS</label>
        <div class="mt-2 flex gap-2">
          <input
            id="otp-input"
            type="text"
            inputmode="numeric"
            pattern="[0-9]*"
            maxlength="6"
            x-model="otp"
            @keydown.enter="verifyOtp()"
            placeholder="123456"
            autocomplete="one-time-code"
            class="flex-1 rounded-lg border border-zinc-700 bg-zinc-800 px-4 py-2.5 text-center text-xl font-mono tracking-widest text-white placeholder-zinc-500 focus:border-indigo-500 focus:outline-none focus:ring-1 focus:ring-indigo-500"
            aria-required="true">
          <button
            @click="verifyOtp()"
            :disabled="loading || otp.length < 4"
            class="rounded-lg bg-indigo-600 px-4 py-2.5 text-sm font-medium text-white hover:bg-indigo-500 disabled:opacity-50 disabled:cursor-not-allowed transition-colors focus:outline-none focus:ring-2 focus:ring-indigo-500">
            <span x-show="!loading">Войти</span>
            <span x-show="loading">
              <svg class="h-4 w-4 animate-spin" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
                <path stroke-linecap="round" stroke-linejoin="round" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"/>
              </svg>
            </span>
          </button>
        </div>
        <button @click="step = 'phone'; otp = ''" class="mt-3 text-sm text-zinc-500 hover:text-zinc-300 transition-colors">
          ← Изменить номер
        </button>
      </div>
    </div>

    <!-- Privacy note -->
    <p class="mt-6 text-center text-xs text-zinc-600">
      Входя, вы соглашаетесь с
      <a href="#" class="text-zinc-500 hover:text-zinc-300 underline">условиями использования</a>
      и <a href="#" class="text-zinc-500 hover:text-zinc-300 underline">политикой конфиденциальности</a>.
    </p>
  </div>
</div>
