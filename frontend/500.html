<!DOCTYPE html>
<html lang="ru" class="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>500 — Ошибка сервера | Convertor</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>tailwind.config = { darkMode: 'class' }</script>
</head>
<body class="flex min-h-screen items-center justify-center bg-slate-900 text-white antialiased">
  <div class="text-center px-4">
    <!-- Large 500 -->
    <div class="text-9xl font-extrabold text-zinc-800 select-none" aria-hidden="true">500</div>

    <div class="mt-4">
      <h1 class="text-2xl font-bold text-white">Ошибка сервера</h1>
      <p class="mt-2 text-zinc-500">
        Что-то пошло не так на нашей стороне. Мы уже работаем над исправлением.
      </p>
    </div>

    <!-- Status indicator -->
    <div class="mt-6 inline-flex items-center gap-2 rounded-full border border-red-500/20 bg-red-500/10 px-4 py-2 text-sm text-red-400">
      <div class="h-2 w-2 rounded-full bg-red-400"></div>
      Технические работы
    </div>

    <div class="mt-8 flex flex-col items-center gap-3 sm:flex-row sm:justify-center">
      <a
        href="/"
        class="rounded-xl bg-indigo-600 px-6 py-3 text-sm font-semibold text-white hover:bg-indigo-500 transition-colors focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:ring-offset-2 focus:ring-offset-slate-900">
        На главную
      </a>
      <button
        onclick="window.location.reload()"
        class="rounded-xl border border-zinc-700 px-6 py-3 text-sm font-medium text-zinc-300 hover:border-zinc-600 hover:text-white transition-colors focus:outline-none focus:ring-2 focus:ring-indigo-500">
        Обновить страницу
      </button>
    </div>

    <!-- Icon -->
    <div class="mt-12 flex justify-center">
      <svg class="h-16 w-16 text-zinc-800" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1" aria-hidden="true">
        <path stroke-linecap="round" stroke-linejoin="round" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"/>
      </svg>
    </div>

    <p class="mt-4 text-xs text-zinc-700">
      Если проблема повторяется — напишите нам в
      <a href="https://t.me/YOUR_BOT" class="text-zinc-600 hover:text-zinc-400 underline" target="_blank" rel="noopener">Telegram</a>
    </p>
  </div>
</body>
</html>
