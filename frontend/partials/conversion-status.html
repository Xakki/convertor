<!-- HTMX partial: conversion status polling fragment -->
<!-- Returned by GET /api/v1/convert/{id}/status when using HTMX polling -->
<!-- The backend should return this fragment with appropriate status values -->
<!-- Example usage:
  <div hx-get="/api/v1/convert/123/status"
       hx-trigger="every 2s"
       hx-target="this"
       hx-swap="outerHTML">
-->

<!-- STATUS: pending -->
<div class="conversion-status-fragment flex items-center gap-3 rounded-lg border border-yellow-500/20 bg-yellow-500/5 px-4 py-3"
  hx-get="/api/v1/convert/{{id}}/status"
  hx-trigger="every 2s"
  hx-target="this"
  hx-swap="outerHTML"
  role="status"
  aria-live="polite"
  aria-label="Статус конвертации: в очереди">
  <div class="flex h-8 w-8 items-center justify-center rounded-full bg-yellow-500/20">
    <svg class="h-4 w-4 text-yellow-400" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
      <circle cx="12" cy="12" r="10"/>
      <path stroke-linecap="round" stroke-linejoin="round" d="M12 6v6l4 2"/>
    </svg>
  </div>
  <div>
    <p class="text-sm font-medium text-yellow-400">В очереди</p>
    <p class="text-xs text-zinc-500">Ожидание свободного воркера...</p>
  </div>
</div>
