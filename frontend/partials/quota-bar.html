<!-- HTMX partial: quota bar fragment -->
<!-- Returned by GET /api/v1/quota -->
<!-- Template variables: {{used}}, {{limit}}, {{ai_used}}, {{ai_limit}}, {{reset_at}} -->

<div class="quota-bar space-y-4" role="region" aria-label="Квота конвертаций">
  <!-- Regular conversions -->
  <div>
    <div class="mb-1.5 flex items-center justify-between text-sm">
      <span class="text-zinc-400">Конвертации</span>
      <span class="font-medium text-white">
        <span class="text-indigo-400">{{used}}</span>
        <span class="text-zinc-600">/</span>
        <span>{{limit}}</span>
      </span>
    </div>
    <div class="h-2 w-full overflow-hidden rounded-full bg-zinc-700" role="progressbar" aria-valuenow="{{used}}" aria-valuemin="0" aria-valuemax="{{limit}}" aria-label="Использовано {{used}} из {{limit}} конвертаций">
      <div
        class="h-full rounded-full bg-indigo-500 transition-all duration-500"
        style="width: {{used_percent}}%">
      </div>
    </div>
  </div>

  <!-- AI conversions -->
  <div>
    <div class="mb-1.5 flex items-center justify-between text-sm">
      <span class="text-zinc-400 flex items-center gap-1.5">
        <svg class="h-3.5 w-3.5 text-purple-400" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
          <path stroke-linecap="round" stroke-linejoin="round" d="M9.663 17h4.673M12 3v1m6.364 1.636l-.707.707M21 12h-1M4 12H3m3.343-5.657l-.707-.707m2.828 9.9a5 5 0 117.072 0l-.548.547A3.374 3.374 0 0014 18.469V19a2 2 0 11-4 0v-.531c0-.895-.356-1.754-.988-2.386l-.548-.547z"/>
        </svg>
        AI конвертации
      </span>
      <span class="font-medium text-white">
        <span class="text-purple-400">{{ai_used}}</span>
        <span class="text-zinc-600">/</span>
        <span>{{ai_limit}}</span>
      </span>
    </div>
    <div class="h-2 w-full overflow-hidden rounded-full bg-zinc-700" role="progressbar" aria-valuenow="{{ai_used}}" aria-valuemin="0" aria-valuemax="{{ai_limit}}" aria-label="Использовано {{ai_used}} из {{ai_limit}} AI конвертаций">
      <div
        class="h-full rounded-full bg-purple-500 transition-all duration-500"
        style="width: {{ai_used_percent}}%">
      </div>
    </div>
  </div>

  <!-- Reset time -->
  <p class="text-xs text-zinc-600">
    Сброс лимитов:
    <span class="text-zinc-500">{{reset_at}}</span>
  </p>
</div>
