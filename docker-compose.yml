
services:

    libreoffice:
        image: ${DOCKER_IMAGE_LIBRE}
        container_name: "${COMPOSE_PROJECT_NAME}-libreoffice"
        restart: unless-stopped
        stop_grace_period: 5s
        stop_signal: SIGTERM
        environment:
            APP_ENV: ${APP_ENV}
            TZ: ${TZ}
            CONTAINER_NAME: ${COMPOSE_PROJECT_NAME}-nginx
        ports:
            - "${EXT_LIBRE_PORT}:80"
        networks:
            - default
        # --shm-size="1gb"
    nginx:
        image: ${DOCKER_IMAGE_NGINX}
        container_name: "${COMPOSE_PROJECT_NAME}-nginx"
        restart: unless-stopped
        stop_grace_period: 5s
        stop_signal: SIGTERM
        working_dir: /app
        volumes:
            - ./public:/app
            - ./nginx/params:/etc/nginx/params
            - ./nginx/${DOCKER_ENV}/conf.d:/etc/nginx/conf.d
            - ./nginx/nginx.conf:/etc/nginx/nginx.conf
            - sock:/run/sock
        environment:
            APP_ENV: ${APP_ENV}
            TZ: ${TZ}
            CONTAINER_NAME: ${COMPOSE_PROJECT_NAME}-nginx
        ports:
            - "${EXT_NGINX_PORT}:80"
        healthcheck:
            test: ["CMD", "curl", "-f", "http://localhost/ping"]
            interval: 15s # Interval between health checks.
            timeout: 3s # Timeout for each health checking.
            retries: 3 # Hou many times retries.
            start_period: 2s # Estimated time to boot.
        networks:
            - default

    mariadb:
        image: ${DOCKER_IMAGE_MARIADB}
        container_name: "${COMPOSE_PROJECT_NAME}-mariadb"
        restart: unless-stopped
        stop_grace_period: 30s
        stop_signal: SIGTERM
        working_dir: /backup
        volumes:
            - ./logs:/var/log
            - mydb:/var/lib/mysql
            - ./mariadb/backup:/backup
            - ./mariadb/${DOCKER_ENV}/mariadb.cnf:/etc/mysql/conf.d/mariadb.cnf
            - ./mariadb/${DOCKER_ENV}/init:/docker-entrypoint-initdb.d
        environment:
            APP_ENV: ${APP_ENV}
            TZ: ${TZ}
            MARIADB_DATABASE: ${DB_DATABASE}
            MARIADB_USER: ${DB_USERNAME}
            MARIADB_PASSWORD: ${DB_PASSWORD}
            MARIADB_ROOT_PASSWORD: ${DB_PASSWORD_ROOT}
            MARIADB_AUTO_UPGRADE: 1
        ports:
            - "${EXT_MYSQL_PORT}:3306"
        healthcheck:
            test: [ "CMD", "healthcheck.sh", "--su-mysql", "--connect", "--innodb_initialized" ]
            interval: 15s # Interval between health checks.
            timeout: 3s # Timeout for each health checking.
            retries: 20 # Hou many times retries.
            start_period: 5s # Estimated time to boot.
        networks:
            - default

networks:
    default:
        driver: bridge
        name: "${COMPOSE_PROJECT_NAME}-network"

volumes:
    mydb:
        name: "${COMPOSE_PROJECT_NAME}-mydb"
