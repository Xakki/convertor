framework:
    messenger:
        failure_transport: failed

        transports:
            async:
                dsn: '%env(REDIS_DSN)%'
                options:
                    stream: conversions
                    group: convertor
                retry_strategy:
                    max_retries: 3
                    delay: 1000
                    multiplier: 2
                    max_delay: 0

            failed:
                dsn: '%env(REDIS_DSN)%'
                options:
                    stream: conversions_failed

        routing:
            App\Message\ConversionMessage: async
